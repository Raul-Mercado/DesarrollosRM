<title>SUITE RM — Una suite, todo tu trabajo · Desarrollos RM</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<style>
  :root {
    --bg: #0d1421;
    --bg-2: #0f1a2e;
    --surface: #16243d;
    --surface-2: #1d2f4d;
    --line: rgba(255,255,255,0.08);
    --line-strong: rgba(255,255,255,0.18);
    --ink: #f6f9ff;
    --ink-2: #c9d5e8;
    --ink-3: #8094b4;
    --brand: #2D7CE6;
    --brand-2: #4a93f0;
    --brand-soft: #6da7f3;
    --brand-deep: #1e4d7b;

    /* Category accents */
    --cat-trabajo: #2D7CE6;
    --cat-admin:   #22c47a;
    --cat-servicios: #a855f7;
    --cat-educacion: #f59e0b;

    --ok: #22c47a;
    --warn: #ffb84d;
    --danger: #e85a4f;
  }
  *,*::before,*::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Manrope', system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink-2);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(109, 167, 243, 0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(109, 167, 243, 0.05) 1px, transparent 1px);
    background-size: 80px 80px;
    pointer-events: none; z-index: 0;
    mask-image: radial-gradient(ellipse at top, black 30%, transparent 80%);
    animation: gridDrift 60s linear infinite;
  }
  @keyframes gridDrift {
    from { background-position: 0 0; }
    to   { background-position: 80px 80px; }
  }

  /* === Animated aurora layer === */
  .aurora {
    position: fixed; inset: -10%;
    pointer-events: none; z-index: 0;
    overflow: hidden;
  }
  .aurora .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.55;
    mix-blend-mode: screen;
    will-change: transform;
  }
  .aurora .b1 { width: 900px; height: 600px; background: radial-gradient(circle, rgba(45,124,230,0.55), transparent 60%); top: -10%; left: -5%; animation: blobDrift1 28s ease-in-out infinite; }
  .aurora .b2 { width: 700px; height: 500px; background: radial-gradient(circle, rgba(168,85,247,0.45), transparent 60%); top: 8%;  right: -8%; animation: blobDrift2 32s ease-in-out infinite; }
  .aurora .b3 { width: 600px; height: 500px; background: radial-gradient(circle, rgba(34,196,122,0.35), transparent 60%); bottom: -10%; left: 30%; animation: blobDrift3 36s ease-in-out infinite; }
  .aurora .b4 { width: 500px; height: 400px; background: radial-gradient(circle, rgba(245,158,11,0.25), transparent 60%); bottom: 5%; right: 25%; animation: blobDrift4 40s ease-in-out infinite; }
  @keyframes blobDrift1 {
    0%,100% { transform: translate(0,0)   scale(1); }
    33%     { transform: translate(160px,80px) scale(1.12); }
    66%     { transform: translate(80px,180px) scale(0.92); }
  }
  @keyframes blobDrift2 {
    0%,100% { transform: translate(0,0) scale(1); }
    50%     { transform: translate(-180px,120px) scale(1.18); }
  }
  @keyframes blobDrift3 {
    0%,100% { transform: translate(0,0) scale(1); }
    40%     { transform: translate(120px,-80px) scale(1.1); }
    80%     { transform: translate(-80px,-40px) scale(0.95); }
  }
  @keyframes blobDrift4 {
    0%,100% { transform: translate(0,0) scale(1); }
    50%     { transform: translate(-140px,-100px) scale(1.15); }
  }

  /* === Floating particle field === */
  .stars {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 0;
    overflow: hidden;
  }
  .stars .s {
    position: absolute;
    width: 2px; height: 2px;
    background: white;
    border-radius: 50%;
    opacity: 0;
    box-shadow: 0 0 4px rgba(255,255,255,0.6);
    animation: starFloat var(--d, 14s) linear infinite;
    animation-delay: var(--del, 0s);
  }
  .stars .s.big { width: 3px; height: 3px; box-shadow: 0 0 6px rgba(109,167,243,0.9); background: #6da7f3; }
  .stars .s.violet { background: #c89af9; box-shadow: 0 0 6px rgba(200,154,249,0.7); }
  @keyframes starFloat {
    0%   { opacity: 0; transform: translateY(20px); }
    10%  { opacity: 0.65; }
    90%  { opacity: 0.65; }
    100% { opacity: 0; transform: translateY(-120px); }
  }

  /* Subtle scanline overlay for CRT vibe */
  .scan {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 1;
    background: repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0.012) 0px,
      rgba(255,255,255,0.012) 1px,
      transparent 1px,
      transparent 3px
    );
    mix-blend-mode: overlay;
  }

  /* Scroll reveal */
  .reveal { opacity: 0; transform: translateY(28px); transition: opacity 0.9s cubic-bezier(.2,.7,.2,1), transform 0.9s cubic-bezier(.2,.7,.2,1); }
  .reveal.on { opacity: 1; transform: translateY(0); }
  .reveal[data-delay="1"] { transition-delay: 0.08s; }
  .reveal[data-delay="2"] { transition-delay: 0.16s; }
  .reveal[data-delay="3"] { transition-delay: 0.24s; }
  .reveal[data-delay="4"] { transition-delay: 0.32s; }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .serif-i { font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400; }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; }
  img { max-width: 100%; display: block; }

  .wrap { max-width: 1280px; margin: 0 auto; padding: 0 48px; position: relative; z-index: 1; }

  /* ===== NAV ===== */
  .nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(13, 20, 33, 0.74);
    backdrop-filter: blur(18px) saturate(160%);
    border-bottom: 1px solid var(--line);
  }
  .nav-inner {
    display: flex; align-items: center; justify-content: space-between;
    height: 80px;
  }
  .brand { display: flex; align-items: center; gap: 14px; }
  .brand-mark {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--brand) 0%, var(--brand-deep) 100%);
    border-radius: 11px;
    display: grid; place-items: center;
    color: white; font-weight: 800; font-size: 15px;
    letter-spacing: 0.04em;
    box-shadow: 0 1px 0 rgba(255,255,255,0.15) inset, 0 8px 24px rgba(45,124,230,0.35);
  }
  .brand-text-wrap { display: flex; flex-direction: column; gap: 3px; }
  .brand-text {
    font-weight: 800; font-size: 17px; letter-spacing: 0.05em;
    color: var(--ink); line-height: 1;
  }
  .brand-text .small {
    color: var(--brand-soft);
    font-weight: 600; margin-right: 4px;
  }
  .brand-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--ink-3);
  }
  .nav-links { display: flex; gap: 32px; }
  .nav-links a {
    font-size: 14px; font-weight: 500; color: var(--ink-2);
    position: relative; padding: 6px 0;
    transition: color 0.18s ease;
  }
  .nav-links a:hover { color: var(--ink); }
  .nav-links a::after {
    content: ''; position: absolute; left: 0; bottom: 0;
    width: 0; height: 1px; background: var(--brand);
    transition: width 0.2s ease;
  }
  .nav-links a:hover::after { width: 100%; }
  .nav-cta {
    display: inline-flex; align-items: center; gap: 10px;
    background: var(--brand); color: white;
    padding: 11px 20px; font-size: 13px; font-weight: 600;
    border-radius: 8px;
    box-shadow: 0 1px 0 rgba(255,255,255,0.2) inset, 0 6px 16px rgba(45,124,230,0.32);
    transition: all 0.18s ease;
  }
  .nav-cta:hover { background: var(--brand-2); transform: translateY(-1px); }

  /* ===== HERO ===== */
  .hero {
    position: relative;
    padding: 100px 0 64px;
    overflow: hidden;
    text-align: center;
  }
  .hero-tag {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--brand-soft); margin-bottom: 28px;
    padding: 7px 16px;
    border: 1px solid rgba(45,124,230,0.3);
    border-radius: 999px;
    background: rgba(45,124,230,0.08);
  }
  .hero-tag .dot { width: 6px; height: 6px; background: var(--brand); border-radius: 50%; box-shadow: 0 0 12px var(--brand); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 50% { opacity: 0.5; } }

  .hero h1 {
    font-family: 'Manrope', sans-serif;
    font-weight: 800;
    font-size: clamp(54px, 7.5vw, 110px);
    line-height: 0.94;
    letter-spacing: -0.035em;
    color: var(--ink);
    margin: 0 auto 24px;
    max-width: 1100px;
  }
  .hero h1 .i {
    font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400;
    color: var(--brand-soft);
    letter-spacing: -0.02em;
  }
  .hero p {
    font-size: 19px; line-height: 1.55;
    color: var(--ink-2); max-width: 700px;
    margin: 0 auto 36px;
  }
  .hero-ctas {
    display: inline-flex; gap: 14px; align-items: center;
    margin-bottom: 56px;
  }
  .btn-primary {
    display: inline-flex; align-items: center; gap: 12px;
    background: var(--brand); color: white;
    padding: 16px 28px; font-size: 15px; font-weight: 700;
    border-radius: 10px;
    box-shadow: 0 1px 0 rgba(255,255,255,0.2) inset, 0 12px 28px rgba(45,124,230,0.32);
    transition: all 0.18s ease;
  }
  .btn-primary:hover { background: var(--brand-2); transform: translateY(-1px); }
  .btn-ghost {
    display: inline-flex; align-items: center; gap: 8px;
    color: var(--ink); padding: 16px 22px;
    font-size: 14px; font-weight: 600;
    border: 1px solid var(--line-strong);
    border-radius: 10px;
    background: rgba(255,255,255,0.02);
  }
  .btn-ghost:hover { border-color: var(--brand); }

  /* Constellation diagram — products as orbiting nodes */
  .constellation {
    position: relative;
    margin: 0 auto;
    width: 100%; max-width: 900px;
    aspect-ratio: 16/9;
  }
  .constellation .rotor {
    position: absolute; inset: 0;
    animation: orbitSpin 90s linear infinite;
    transform-origin: 50% 50%;
  }
  @keyframes orbitSpin {
    from { transform: rotate(0); }
    to   { transform: rotate(360deg); }
  }
  .constellation .rotor .orbit-node {
    /* counter-rotate the chips so they stay upright while the orbit ring spins */
    animation: orbitSpinCounter 90s linear infinite;
    transform-origin: 50% 50%;
  }
  @keyframes orbitSpinCounter {
    from { transform: rotate(0); }
    to   { transform: rotate(-360deg); }
  }
  .constellation .center {
    position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
    display: flex; align-items: center; gap: 18px;
    background: linear-gradient(135deg, var(--brand) 0%, var(--brand-deep) 100%);
    color: white;
    padding: 22px 32px;
    border-radius: 18px;
    box-shadow: 0 1px 0 rgba(255,255,255,0.15) inset, 0 0 0 8px rgba(45,124,230,0.1), 0 30px 80px rgba(45,124,230,0.35);
    z-index: 3;
    animation: centerBreathe 4s ease-in-out infinite;
  }
  @keyframes centerBreathe {
    0%,100% { box-shadow: 0 1px 0 rgba(255,255,255,0.15) inset, 0 0 0 8px rgba(45,124,230,0.1),  0 30px 80px rgba(45,124,230,0.35); }
    50%     { box-shadow: 0 1px 0 rgba(255,255,255,0.2)  inset, 0 0 0 14px rgba(45,124,230,0.06), 0 40px 100px rgba(45,124,230,0.5); }
  }
  .constellation .center .rm {
    width: 50px; height: 50px;
    background: rgba(255,255,255,0.18);
    border-radius: 12px;
    display: grid; place-items: center;
    font-weight: 800; font-size: 16px; letter-spacing: 0.04em;
    border: 1px solid rgba(255,255,255,0.25);
  }
  .constellation .center .label { font-weight: 800; font-size: 22px; letter-spacing: 0.04em; line-height: 1; }
  .constellation .center .sub { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(255,255,255,0.7); margin-top: 4px; font-family: 'JetBrains Mono', monospace; }
  .orbit-node {
    position: absolute;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    z-index: 2;
    animation: nodeFloat var(--bob, 6s) ease-in-out infinite;
    animation-delay: var(--bobd, 0s);
  }
  /* `translate` is a separate CSS property from `transform`, so the inline
     transform: translate(-50%, ...) used for centering still applies */
  @keyframes nodeFloat {
    0%, 100% { translate: 0 0; }
    50%      { translate: 0 -10px; }
  }
  .orbit-node .chip {
    width: 56px; height: 56px;
    border-radius: 14px;
    display: grid; place-items: center;
    color: white; font-weight: 800; font-size: 18px;
    letter-spacing: 0.02em;
    box-shadow: 0 12px 28px rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.18);
    position: relative;
    overflow: hidden;
  }
  .orbit-node .chip::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.35) 50%, transparent 70%);
    background-size: 200% 100%;
    background-position: 200% 0;
    animation: chipShimmer 5s ease-in-out infinite;
  }
  @keyframes chipShimmer {
    0%, 70%, 100% { background-position: 200% 0; }
    85%           { background-position: -100% 0; }
  }
  .orbit-node .chip::before {
    content: '';
    position: absolute; inset: -3px;
    border-radius: 16px;
    border: 1px solid currentColor;
    opacity: 0.25;
    animation: chipPing 3s ease-out infinite;
  }
  @keyframes chipPing {
    0% { transform: scale(1);    opacity: 0.45; }
    100% { transform: scale(1.4); opacity: 0; }
  }
  .orbit-node .name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--ink-2);
    white-space: nowrap;
  }
  .orbit-line {
    position: absolute; inset: 0;
    pointer-events: none;
  }
  /* travelling dots along the orbit lines */
  .orbit-line .pkt {
    animation: pktMove 3.6s linear infinite;
  }
  @keyframes pktMove {
    0%   { offset-distance: 0%;   opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { offset-distance: 100%; opacity: 0; }
  }

  /* ===== STATS ===== */
  .stats {
    margin-top: 32px;
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    padding: 36px 0;
  }
  .stats-inner {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 32px;
  }
  .stat .v {
    font-family: 'Manrope', sans-serif;
    font-weight: 800; font-size: 38px;
    color: var(--ink); letter-spacing: -0.025em;
    line-height: 1;
  }
  .stat .v .u { color: var(--brand); font-size: 18px; font-weight: 600; margin-left: 4px; }
  .stat .l {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; text-transform: uppercase;
    letter-spacing: 0.18em; color: var(--ink-3);
    margin-top: 12px;
  }

  /* ===== CATEGORY SECTIONS ===== */
  .section { padding: 120px 0; position: relative; }
  .section-eyebrow {
    display: inline-flex; align-items: center; gap: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--brand-soft);
  }
  .section-eyebrow .id { color: var(--ink-3); }
  .section-eyebrow::before {
    content: ''; width: 28px; height: 1px; background: var(--brand);
  }
  .section-title {
    font-family: 'Manrope', sans-serif;
    font-weight: 800; font-size: clamp(40px, 5vw, 64px);
    line-height: 1; letter-spacing: -0.028em;
    color: var(--ink);
    margin: 22px 0 24px;
    max-width: 900px;
  }
  .section-title .i { font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400; color: var(--brand-soft); }
  .section-desc {
    font-size: 18px; line-height: 1.55; color: var(--ink-2);
    max-width: 640px;
  }
  .section-head-row {
    display: flex; align-items: flex-end; justify-content: space-between;
    gap: 48px; margin-bottom: 64px;
  }
  .section-head-row .right { flex-shrink: 0; max-width: 360px; }

  /* Category tab nav */
  .cat-tabs {
    display: flex; gap: 6px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 48px;
    flex-wrap: wrap;
  }
  .cat-tab {
    display: inline-flex; align-items: center; gap: 12px;
    padding: 16px 22px;
    font-size: 14px; font-weight: 600;
    color: var(--ink-3);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    cursor: pointer;
    transition: all 0.18s ease;
  }
  .cat-tab:hover { color: var(--ink-2); }
  .cat-tab.on { color: var(--ink); }
  .cat-tab .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: currentColor;
  }
  .cat-tab .count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.1em;
    color: var(--ink-3); margin-left: 4px;
  }
  .cat-tab.on .count { color: var(--ink-2); }

  /* Category panel header */
  .cat-panel-head {
    display: grid; grid-template-columns: 1fr auto; gap: 48px; align-items: flex-end;
    margin-bottom: 36px;
  }
  .cat-panel-head .cat-name {
    font-family: 'Manrope', sans-serif;
    font-weight: 800; font-size: 44px;
    color: var(--ink); letter-spacing: -0.022em;
    line-height: 1; margin: 0;
  }
  .cat-panel-head .cat-name .i { font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400; }
  .cat-panel-head .cat-desc {
    color: var(--ink-2); font-size: 15px; line-height: 1.55;
    max-width: 380px;
  }

  /* Product cards grid */
  .prod-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }
  .prod {
    position: relative;
    background: linear-gradient(180deg, var(--surface) 0%, var(--bg-2) 100%);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 28px 26px;
    min-height: 280px;
    display: flex; flex-direction: column;
    transition: all 0.22s ease;
    overflow: hidden;
  }
  .prod:hover {
    transform: translateY(-3px);
    border-color: rgba(255,255,255,0.16);
    box-shadow: 0 24px 60px -16px rgba(0,0,0,0.5);
  }
  .prod::before {
    content: ''; position: absolute;
    top: 0; left: 0; right: 0; height: 3px;
    background: var(--cat-color, var(--brand));
    opacity: 0.85;
  }
  .prod.featured {
    background: linear-gradient(180deg, rgba(45,124,230,0.14) 0%, var(--surface) 60%);
    border-color: rgba(45,124,230,0.35);
    box-shadow: 0 24px 60px -16px rgba(45,124,230,0.18);
  }
  .prod-no {
    position: absolute; top: 24px; right: 26px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.18em;
    color: var(--ink-3);
  }
  .prod-icon {
    width: 52px; height: 52px;
    border-radius: 13px;
    display: grid; place-items: center;
    color: white; font-weight: 800; font-size: 20px;
    letter-spacing: 0.02em;
    margin-bottom: 22px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.32);
  }
  .prod-name {
    font-family: 'Manrope', sans-serif;
    font-size: 22px; font-weight: 800;
    color: var(--ink);
    letter-spacing: -0.012em;
    margin: 0 0 4px;
    display: flex; align-items: baseline; gap: 1px;
  }
  .prod-name .pipe { font-weight: 500; opacity: 0.5; margin: 0 2px; }
  .prod-name .suffix { font-weight: 600; }
  .prod-tag {
    font-size: 13px; color: var(--ink-2);
    margin-bottom: 16px;
  }
  .prod-desc {
    font-size: 13.5px; color: var(--ink-3);
    line-height: 1.55;
    flex: 1;
    margin-bottom: 18px;
  }
  .prod-foot {
    display: flex; justify-content: space-between; align-items: center;
    padding-top: 18px;
    border-top: 1px solid var(--line);
  }
  .prod-foot-left { display: flex; align-items: center; gap: 10px; }
  .prod-status {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: 'JetBrains Mono', monospace;

// ============ SCROLL REVEAL HOOK ============
const useReveal = () => {
  React.useEffect(() => {
    const els = document.querySelectorAll('.reveal');
    if (!('IntersectionObserver' in window)) {
      els.forEach(el => el.classList.add('on'));
      return;
    }
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('on');
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });
    els.forEach(el => io.observe(el));
    return () => io.disconnect();
  }, []);
};

// ============ COUNT-UP HOOK ============
const useCountUp = (target, dur = 1400) => {
  const [n, setN] = React.useState(0);
  React.useEffect(() => {
    if (target == null) return;
    const start = performance.now();
    let raf;
    const tick = (now) => {
      const t = Math.min(1, (now - start) / dur);
      const eased = 1 - Math.pow(1 - t, 3);
      setN(target * eased);
      if (t < 1) raf = requestAnimationFrame(tick);
      else setN(target);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [target, dur]);
  return Number.isInteger(target) ? Math.floor(n) : Math.round(n);
};

  return (
    <div className="constellation">
      <svg className="orbit-line" viewBox="0 0 100 56" preserveAspectRatio="none">
        <defs>
          {items.map((n, i) => {
            const nx = parseFloat(n.left);

          return (

              <circle r="0.7" fill={n.color}>

                  dur={`${dur+1}s`} repeatCount="indefinite" begin={`${delay-1.4}s`} />
              </circle>
            </g>
          );

};

// ===== COUNTER HELPERS =====
const COUNTER_NS  = 'genesis-pro-rm';
const COUNTER_KEY = 'descargas-windows';
const COUNTER_API = 'https://abacus.jasoncameron.dev';

async function fetchDownloadCount() {
  try {
    const r = await fetch(`${COUNTER_API}/get/${COUNTER_NS}/${COUNTER_KEY}`);
    if (!r.ok) throw new Error();
    const j = await r.json();
    return Number(j.value || 0);
  } catch(e) { return null; }
}

async function bumpDownloadCount() {
  const flag = 'gp_dl_bumped_v2';
  if (localStorage.getItem(flag)) return null;
  try {
    const r = await fetch(`${COUNTER_API}/hit/${COUNTER_NS}/${COUNTER_KEY}`);
    if (!r.ok) throw new Error();
    const j = await r.json();
    localStorage.setItem(flag, '1');
    return Number(j.value || 0);
  } catch(e) { return null; }
}


const DownloadCounter = () => {
  const [count, setCount]   = React.useState(null);
  const [status, setStatus] = React.useState('loading');
  const animated = useCountUp(count ?? 0);

  React.useEffect(() => {
    let alive = true;
    fetchDownloadCount().then(v => {
      if (!alive) return;
      if (v == null) { setStatus('offline'); setCount(0); }
      else           { setStatus('live');    setCount(v); }
    });
    window.__gpBumpDownload = async () => {
      const v = await bumpDownloadCount();
      if (v != null) setCount(v);
    };
    return () => { alive = false; };
  }, []);

  const display = String(animated).padStart(6, '0');
  const groups  = display.replace(/(\d{3})(?=\d)/g, '$1 ').split(' ');

  return (
    <section style={{padding:'60px 0', position:'relative', zIndex:1}}>
      <div className="wrap">
        <div style={{
          background: 'linear-gradient(135deg, rgba(45,124,230,0.12) 0%, rgba(30,77,123,0.18) 100%)',
          border: '1px solid rgba(45,124,230,0.3)',
          borderRadius: 20, padding: '48px 40px',
          textAlign: 'center', position:'relative', overflow:'hidden'
        }}>
          <div style={{fontFamily:"'JetBrains Mono',monospace", fontSize:11, letterSpacing:'0.22em', textTransform:'uppercase', color:'var(--brand-soft)', marginBottom:16, display:'flex', alignItems:'center', justifyContent:'center', gap:8}}>
            <span style={{width:7,height:7,borderRadius:'50%',background:status==='live'?'#22c47a':'#ffb84d',display:'inline-block',boxShadow:status==='live'?'0 0 10px #22c47a':'none',animation:status==='live'?'dotpulse 2s ease-in-out infinite':'none'}}/>

// ===== FORMULARIO DE CONTACTO =====
const ContactForm = () => {
  const [open,    setOpen]    = React.useState(false);
  const [status,  setStatus]  = React.useState('idle'); // idle | sending | ok | error
  const [form,    setForm]    = React.useState({nombre:'', email:'', asunto:'', mensaje:''});

  const handleChange = e => setForm(f => ({...f, [e.target.name]: e.target.value}));

  const handleSubmit = async e => {
    e.preventDefault();
    setStatus('sending');
    try {
      const res = await fetch('https://formspree.io/f/xqejdkaq', {
        method: 'POST',
        headers: {'Content-Type': 'application/json', 'Accept': 'application/json'},
        body: JSON.stringify({
          nombre:  form.nombre,
          email:   form.email,
          asunto:  form.asunto,
          mensaje: form.mensaje,
          _subject: `[Desarrollos RM] ${form.asunto}`,
        })
      });
      if (res.ok) { setStatus('ok'); setForm({nombre:'', email:'', asunto:'', mensaje:''}); }
      else         { setStatus('error'); }
    } catch { setStatus('error'); }
  };

  const inputStyle = {
    width:'100%', padding:'12px 14px', borderRadius:8, fontSize:13,
    background:'var(--bg)', border:'1px solid var(--border)',
    color:'var(--ink)', outline:'none', fontFamily:'inherit',
    boxSizing:'border-box', marginTop:6
  };

  return (
    <>
      <button onClick={() => { setOpen(true); setStatus('idle'); }} style={{
        background:'none', border:'none', color:'var(--brand-soft)',
        cursor:'pointer', fontSize:12, textDecoration:'underline', padding:0
      }}>Contacto</button>

      {open && (
        <div style={{
          position:'fixed', inset:0, background:'rgba(0,0,0,0.82)',
          zIndex:9999, display:'flex', alignItems:'center', justifyContent:'center',
          padding:'20px'
        }} onClick={() => setOpen(false)}>
          <div onClick={e => e.stopPropagation()} style={{
            background:'var(--surface)', borderRadius:16, padding:'40px',
            maxWidth:520, width:'100%', border:'1px solid var(--border)'
          }}>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:24}}>
              <h2 style={{margin:0, fontSize:22, color:'var(--ink)'}}>✉️ Contacto</h2>
              <button onClick={() => setOpen(false)} style={{
                background:'none', border:'none', color:'var(--ink-2)',
                fontSize:22, cursor:'pointer', padding:'4px 8px'
              }}>✕</button>
            </div>

            {status === 'ok' ? (
              <div style={{textAlign:'center', padding:'40px 0'}}>
                <div style={{fontSize:48, marginBottom:16}}>✅</div>
                <div style={{fontSize:18, fontWeight:700, color:'var(--ink)', marginBottom:8}}>¡Mensaje enviado!</div>
                <div style={{color:'var(--ink-2)', fontSize:14}}>Te respondemos a la brevedad en <strong>{form.email || 'tu email'}</strong>.</div>
                <button onClick={() => setOpen(false)} style={{
                  marginTop:24, padding:'10px 28px', borderRadius:8,
                  background:'var(--brand)', color:'#fff', border:'none',
                  cursor:'pointer', fontWeight:600, fontSize:14
                }}>Cerrar</button>
              </div>
            ) : (
              <form onSubmit={handleSubmit}>
                {[
                  {label:'Tu nombre', name:'nombre', type:'text', placeholder:'Raúl Mercado', required:true},
                  {label:'Tu email', name:'email', type:'email', placeholder:'tu@email.com', required:true},
                  {label:'Asunto', name:'asunto', type:'text', placeholder:'Consulta sobre GÉNESIS PRO', required:true},
                ].map(({label, name, type, placeholder, required}) => (
                  <div key={name} style={{marginBottom:14}}>
                    <label style={{fontSize:12, color:'var(--ink-2)', fontWeight:600, textTransform:'uppercase', letterSpacing:'0.08em'}}>{label}</label>
                    <input type={type} name={name} placeholder={placeholder} required={required}
                      value={form[name]} onChange={handleChange} style={inputStyle} />
                  </div>
                ))}
                <div style={{marginBottom:20}}>
                  <label style={{fontSize:12, color:'var(--ink-2)', fontWeight:600, textTransform:'uppercase', letterSpacing:'0.08em'}}>Mensaje</label>
                  <textarea name="mensaje" placeholder="Escribí tu consulta, sugerencia o reporte..." required
                    value={form.mensaje} onChange={handleChange} rows={5}
                    style={{...inputStyle, resize:'vertical', minHeight:120}} />
                </div>
                {status === 'error' && (
                  <div style={{color:'#e74c3c', fontSize:13, marginBottom:12}}>
                    Error al enviar. Intentá de nuevo o escribí a raul.roberto.mercado@gmail.com
                  </div>
                )}
                <button type="submit" disabled={status === 'sending'} style={{
                  width:'100%', padding:'14px', borderRadius:8,
                  background:status==='sending'?'var(--border)':'var(--brand)',
                  color:'#fff', border:'none', cursor:status==='sending'?'not-allowed':'pointer',
                  fontWeight:700, fontSize:15, fontFamily:'inherit',
                  transition:'background 0.2s'
                }}>
                  {status === 'sending' ? 'Enviando…' : 'Enviar mensaje →'}
                </button>
                <div style={{marginTop:12, fontSize:11, color:'var(--ink-3)', textAlign:'center'}}>
                  También podés escribirnos directamente a raul.roberto.mercado@gmail.com
                </div>
              </form>
            )}
          </div>
        </div>
      )}
    </>
  );
};
